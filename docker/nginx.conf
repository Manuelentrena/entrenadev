events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        # PRIMERO: Archivos JS específicos (más específicos primero)
        location ~* \.js$ {
            add_header Content-Type "application/javascript" always;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            log_not_found off;
        }

        # SEGUNDO: Archivos CSS específicos
        location ~* \.css$ {
            add_header Content-Type "text/css" always;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            log_not_found off;
        }

        # TERCERO: Otros archivos estáticos
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            log_not_found off;
        }

        # CUARTO: Redirección a index.php para todas las demás rutas
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # QUINTO: Procesar archivos PHP
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS on;
            fastcgi_param HTTP_X_FORWARDED_PROTO https;
        }
    }
}
