name: CI (Lint & Tests)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # PHP
      # =========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, pdo, pdo_pgsql, zip, intl
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      # =========================
      # NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # =========================
      # ENV
      # =========================
      - name: Copy .env for CI
        run: |
          cat <<EOF > .env
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_CONNECTION=pgsql
          DB_HOST=localhost
          DB_PORT=5432
          DB_DATABASE=testing
          DB_USERNAME=postgres
          DB_PASSWORD=postgres

          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          EOF

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      # =========================
      # LINT BACKEND (PHP)
      # =========================
      - name: Laravel Pint (PHP Lint)
        run: ./vendor/bin/pint --test

      # =========================
      # LINT FRONTEND (JS/TS)
      # =========================
      - name: ESLint (Frontend Lint)
        run: npm run lint

      # =========================
      # TESTS
      # =========================
      - name: Run tests
        run: php artisan test
